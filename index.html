<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas Olimpo</title>
    
    <!-- Tradutor do Tailwind (Estilos e Cores) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tradutores do React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Tradutor Babel (Permite usar JSX dentro do HTML) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos globais para a barra de rolagem e para não selecionar texto no celular ao dar toque longo */
        body { margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d8e0db; border-radius: 10px; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: #243329; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #D4AF37; }
        
        * { -webkit-touch-callout: none; }
    </style>
</head>
<body>
    <!-- Aqui é onde o nosso App vai "nascer" -->
    <div id="root"></div>

    <!-- O nosso código React entra aqui dentro, usando text/babel -->
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ---- Ícones (Criados manualmente para funcionar no HTML sem dependências) ----
        const Icon = ({ children, size = 24, className = '', strokeWidth = 2, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Plus = (props) => <Icon {...props}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
        const Trash2 = (props) => <Icon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const CheckCircle2 = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Circle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const Leaf = (props) => <Icon {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Icon>;
        const Crown = (props) => <Icon {...props}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></Icon>;
        const Sparkles = (props) => <Icon {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></Icon>;
        const Palmtree = (props) => <Icon {...props}><path d="M13 8c0-2.76-2.46-5-5.5-5S2 5.24 2 8h2l1-1.92L6.34 8A5.5 5.5 0 0 0 10.5 14a5.5 5.5 0 0 0 4.39-4.45L16 8h2z"/><path d="M5.9 12.5a5.5 5.5 0 0 0 5.4 5.5h.2a5.5 5.5 0 0 0 5.4-5.5L18 11M12 22V14"/></Icon>;
        const Moon = (props) => <Icon {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const Sun = (props) => <Icon {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const Pencil = (props) => <Icon {...props}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></Icon>;
        const AlertTriangle = (props) => <Icon {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></Icon>;

        // ---- Código Principal da Aplicação ----
        const LOCAL_STORAGE_KEY = 'olimpo_tasks_data';
        const THEME_STORAGE_KEY = 'olimpo_theme_preference';

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
                return savedTheme === 'true';
            });

            const [lists, setLists] = useState(() => {
                const savedLists = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (savedLists) {
                    try { return JSON.parse(savedLists); } catch (e) { return []; }
                }
                return [
                    {
                        id: '1', title: 'Gestão de Património',
                        tasks: [
                            { id: 't1', text: 'Reunião com o arquiteto paisagista', completed: true },
                            { id: 't2', text: 'Rever portfólio de investimentos do trimestre', completed: false }
                        ]
                    },
                    {
                        id: '2', title: 'Eventos Sociais',
                        tasks: [
                            { id: 't4', text: 'Confirmar presença na Gala', completed: false },
                            { id: 't5', text: 'Encomendar arranjos florais', completed: true }
                        ]
                    }
                ];
            });

            const [newListTitle, setNewListTitle] = useState('');
            const [showAddList, setShowAddList] = useState(false);
            const carouselRef = useRef(null);

            const [actionMenu, setActionMenu] = useState({ 
                isOpen: false, type: null, listId: null, taskId: null, currentText: '', mode: 'menu' 
            });

            useEffect(() => { localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(lists)); }, [lists]);
            useEffect(() => { localStorage.setItem(THEME_STORAGE_KEY, isDarkMode); }, [isDarkMode]);

            const addList = (e) => {
                e.preventDefault();
                if (!newListTitle.trim()) return;
                setLists([...lists, { id: Date.now().toString(), title: newListTitle, tasks: [] }]);
                setNewListTitle('');
                setShowAddList(false);
                setTimeout(() => {
                    if (carouselRef.current) carouselRef.current.scrollTo({ left: carouselRef.current.scrollWidth, behavior: 'smooth' });
                }, 100);
            };

            const deleteList = (listId) => { setLists(lists.filter(l => l.id !== listId)); closeActionMenu(); };
            const editList = (listId, newTitle) => {
                if (!newTitle.trim()) return;
                setLists(lists.map(l => l.id === listId ? { ...l, title: newTitle } : l));
                closeActionMenu();
            };

            const addTask = (listId, taskText) => {
                if (!taskText.trim()) return;
                setLists(lists.map(l => l.id === listId ? { ...l, tasks: [...l.tasks, { id: Date.now().toString(), text: taskText, completed: false }] } : l));
            };
            const toggleTask = (listId, taskId) => {
                setLists(lists.map(l => l.id === listId ? { ...l, tasks: l.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t) } : l));
            };
            const deleteTask = (listId, taskId) => {
                setLists(lists.map(l => l.id === listId ? { ...l, tasks: l.tasks.filter(t => t.id !== taskId) } : l));
                closeActionMenu();
            };
            const editTask = (listId, taskId, newText) => {
                if (!newText.trim()) return;
                setLists(lists.map(l => l.id === listId ? { ...l, tasks: l.tasks.map(t => t.id === taskId ? { ...t, text: newText } : t) } : l));
                closeActionMenu();
            };

            const openActionMenu = (type, listId, taskId, currentText) => {
                if (navigator.vibrate) navigator.vibrate(50);
                setActionMenu({ isOpen: true, type, listId, taskId, currentText, mode: 'menu' });
            };
            const closeActionMenu = () => setActionMenu({ ...actionMenu, isOpen: false });

            const ActionModal = () => {
                const [editInput, setEditInput] = useState(actionMenu.currentText);
                if (!actionMenu.isOpen) return null;
                const isList = actionMenu.type === 'list';
                const title = isList ? 'Pilar de Organização' : 'Compromisso';

                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center px-6 animate-in fade-in duration-200">
                        <div className="absolute inset-0 bg-[#000000]/40 backdrop-blur-md" onClick={closeActionMenu} />
                        <div className={`relative w-full max-w-sm rounded-[2rem] p-8 shadow-2xl transition-all ${isDarkMode ? 'bg-[#121a15] border border-[#243329]' : 'bg-white border border-[#e2e8e4]'}`}>
                            {actionMenu.mode === 'menu' && (
                                <div className="flex flex-col gap-3">
                                    <div className="text-center mb-4">
                                        <Crown size={24} className="text-[#D4AF37] mx-auto mb-2" />
                                        <h3 className={`font-serif text-lg tracking-wide ${isDarkMode ? 'text-[#D4AF37]' : 'text-[#183a29]'}`}>{title}</h3>
                                        <p className={`text-xs font-light truncate px-4 mt-1 ${isDarkMode ? 'text-[#84948a]' : 'text-[#748277]'}`}>"{actionMenu.currentText}"</p>
                                    </div>
                                    <button onClick={() => setActionMenu({ ...actionMenu, mode: 'edit' })} className={`flex items-center justify-center gap-3 py-3.5 rounded-2xl font-medium transition-all ${isDarkMode ? 'bg-[#1c261f] text-[#d1d7d3] border-[#243329]' : 'bg-[#f4f7f5] text-[#2c352d] border-[#e2e8e4]'} border`}>
                                        <Pencil size={18} className="text-[#D4AF37]" /> Modificar Texto
                                    </button>
                                    <button onClick={() => setActionMenu({ ...actionMenu, mode: 'deleteConfirm' })} className={`flex items-center justify-center gap-3 py-3.5 rounded-2xl font-medium transition-all ${isDarkMode ? 'bg-[#3d1a1a]/40 text-[#ff8a8a] border-[#3d1a1a]' : 'bg-[#fff0f0] text-[#d32f2f] border-[#ffe0e0]'} border`}>
                                        <Trash2 size={18} /> Eliminar Permanentemente
                                    </button>
                                    <button onClick={closeActionMenu} className={`mt-2 py-3 rounded-2xl font-bold uppercase tracking-widest text-[10px] transition-all ${isDarkMode ? 'text-[#84948a]' : 'text-[#a4b3a9]'}`}>Cancelar</button>
                                </div>
                            )}
                            {actionMenu.mode === 'edit' && (
                                <div className="flex flex-col gap-6">
                                    <div className="text-center"><h3 className={`font-serif text-lg tracking-wide ${isDarkMode ? 'text-[#D4AF37]' : 'text-[#183a29]'}`}>Reescrever {title}</h3></div>
                                    <input type="text" autoFocus value={editInput} onChange={(e) => setEditInput(e.target.value)} className={`w-full bg-transparent border-b-2 text-center text-lg px-2 py-3 focus:outline-none font-light transition-colors ${isDarkMode ? 'border-[#3a4d41] text-[#D4AF37] focus:border-[#D4AF37]' : 'border-[#d8e0db] text-[#183a29] focus:border-[#183a29]'}`} />
                                    <div className="flex gap-3 mt-2">
                                        <button onClick={closeActionMenu} className={`flex-1 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition-all border ${isDarkMode ? 'border-[#3a4d41] text-[#84948a]' : 'border-[#e2e8e4] text-[#748277]'}`}>Cancelar</button>
                                        <button onClick={() => isList ? editList(actionMenu.listId, editInput) : editTask(actionMenu.listId, actionMenu.taskId, editInput)} disabled={!editInput.trim()} className={`flex-1 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition-all shadow-lg ${isDarkMode ? 'bg-[#D4AF37] text-[#0d1310] disabled:opacity-40' : 'bg-[#183a29] text-[#D4AF37] disabled:opacity-40'}`}>Salvar</button>
                                    </div>
                                </div>
                            )}
                            {actionMenu.mode === 'deleteConfirm' && (
                                <div className="flex flex-col gap-6 text-center">
                                    <AlertTriangle size={36} className="mx-auto text-red-500 mb-2" />
                                    <div>
                                        <h3 className={`font-serif text-lg tracking-wide ${isDarkMode ? 'text-red-400' : 'text-red-600'}`}>Tem certeza?</h3>
                                        <p className={`text-sm font-light mt-2 ${isDarkMode ? 'text-[#84948a]' : 'text-[#748277]'}`}>Esta ação não pode ser desfeita.</p>
                                    </div>
                                    <div className="flex gap-3 mt-2">
                                        <button onClick={() => setActionMenu({ ...actionMenu, mode: 'menu' })} className={`flex-1 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition-all border ${isDarkMode ? 'border-[#3a4d41] text-[#84948a]' : 'border-[#e2e8e4] text-[#748277]'}`}>Voltar</button>
                                        <button onClick={() => isList ? deleteList(actionMenu.listId) : deleteTask(actionMenu.listId, actionMenu.taskId)} className="flex-1 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition-all shadow-lg bg-red-600 text-white">Confirmar</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const ListCard = ({ list }) => {
                const [newTaskText, setNewTaskText] = useState('');
                const handleAddTask = (e) => { e.preventDefault(); addTask(list.id, newTaskText); setNewTaskText(''); };
                const completedTasks = list.tasks.filter(t => t.completed).length;
                const totalTasks = list.tasks.length;
                const progress = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

                return (
                    <div className={`snap-center shrink-0 w-[85vw] sm:w-[380px] h-[75vh] max-h-[750px] flex flex-col rounded-t-[3.5rem] rounded-b-3xl overflow-hidden transition-all duration-500 shadow-2xl relative border ${isDarkMode ? 'bg-[#17201a] border-[#243329]' : 'bg-white border-[#e2e8e4]'}`}>
                        <div 
                            onContextMenu={(e) => { e.preventDefault(); openActionMenu('list', list.id, null, list.title); }}
                            className={`px-8 pt-10 pb-5 relative z-10 transition-colors duration-500 cursor-context-menu select-none active:opacity-80 ${isDarkMode ? 'bg-[#0f1511]' : 'bg-[#183a29]'}`}
                            title="Pressione e segure para Opções"
                        >
                            <div className="absolute top-4 left-1/2 -translate-x-1/2 text-[#D4AF37] opacity-90 pointer-events-none"><Crown size={22} /></div>
                            <div className="flex justify-center items-center mb-5 mt-2 relative pointer-events-none">
                                <h2 className="text-xl font-serif text-[#D4AF37] tracking-wider text-center w-full drop-shadow-sm truncate px-4">{list.title}</h2>
                            </div>
                            <div className="space-y-2 pointer-events-none">
                                <div className={`flex justify-center text-[10px] font-medium uppercase tracking-widest ${isDarkMode ? 'text-[#84948a]' : 'text-[#8aa696]'}`}><span>{progress}% Concluído</span></div>
                                <div className={`h-[2px] w-24 mx-auto rounded-full overflow-hidden ${isDarkMode ? 'bg-[#243329]' : 'bg-[#214d37]'}`}>
                                    <div className="h-full bg-gradient-to-r from-[#B8942A] to-[#F3D779] transition-all duration-700 ease-out shadow-[0_0_10px_rgba(212,175,55,0.5)]" style={{ width: `${progress}%` }} />
                                </div>
                            </div>
                        </div>

                        <div className={`flex-1 overflow-y-auto px-6 py-6 space-y-3 custom-scrollbar ${isDarkMode ? 'dark-scrollbar' : ''} relative z-10 transition-colors duration-500 ${isDarkMode ? 'bg-[#17201a]' : 'bg-[#fcfdfc]'}`}>
                            {list.tasks.length === 0 ? (
                                <div className={`h-full flex flex-col items-center justify-center ${isDarkMode ? 'text-[#52665a]' : 'text-[#a4b3a9]'}`}>
                                    <Sparkles size={32} className="mb-4 text-[#D4AF37] opacity-60" />
                                    <p className="text-sm font-light text-center tracking-wide pointer-events-none">Um espaço em branco,<br/>pronto para ser moldado.</p>
                                </div>
                            ) : (
                                list.tasks.map(task => (
                                    <div 
                                        key={task.id} 
                                        onContextMenu={(e) => { e.preventDefault(); openActionMenu('task', list.id, task.id, task.text); }}
                                        className={`group flex items-start gap-4 p-3.5 rounded-2xl transition-all duration-300 border cursor-context-menu select-none active:scale-[0.98] ${task.completed ? (isDarkMode ? 'bg-[#131b16] border-transparent opacity-60' : 'bg-[#f4f7f5] border-transparent opacity-70') : (isDarkMode ? 'bg-[#1c261f] border-[#243329]' : 'bg-white border-[#e2e8e4]')}`}
                                    >
                                        <button onClick={(e) => { e.stopPropagation(); toggleTask(list.id, task.id); }} className="mt-0.5 flex-shrink-0 focus:outline-none transition-transform active:scale-90">
                                            {task.completed ? <CheckCircle2 size={22} className="text-[#D4AF37]" /> : <Circle size={22} className={`${isDarkMode ? 'text-[#3a4d41] group-hover:text-[#D4AF37]' : 'text-[#c6d1cb] group-hover:text-[#D4AF37]'} transition-colors`} />}
                                        </button>
                                        <span className={`flex-1 text-[15px] font-light leading-relaxed transition-all duration-300 pointer-events-none ${task.completed ? (isDarkMode ? 'text-[#52665a] line-through decoration-[#3a4d41]' : 'text-[#a4b3a9] line-through decoration-[#d8e0db]') : (isDarkMode ? 'text-[#d1d7d3]' : 'text-[#2c352d]')}`}>
                                            {task.text}
                                        </span>
                                        <div className={`opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity ${isDarkMode ? 'text-[#3a4d41]' : 'text-[#d8e0db]'}`}>
                                            <div className="w-1 h-1 rounded-full bg-current mx-[1px]"></div>
                                            <div className="w-1 h-1 rounded-full bg-current mx-[1px]"></div>
                                            <div className="w-1 h-1 rounded-full bg-current mx-[1px]"></div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        <div className={`px-6 pb-6 pt-4 relative z-10 transition-colors duration-500 border-t-0 ${isDarkMode ? 'bg-[#0f1511]' : 'bg-[#183a29]'}`}>
                            <form onSubmit={handleAddTask} className="relative">
                                <input type="text" value={newTaskText} onChange={(e) => setNewTaskText(e.target.value)} placeholder="Adicionar novo compromisso..." className={`w-full bg-transparent border-b text-sm font-light px-2 py-3 focus:outline-none transition-colors ${isDarkMode ? 'border-[#243329] text-[#D4AF37] focus:border-[#D4AF37] placeholder:text-[#3a4d41]' : 'border-[#2a573e] text-[#D4AF37] focus:border-[#D4AF37] placeholder:text-[#527d64]'}`} />
                                <button type="submit" disabled={!newTaskText.trim()} className="absolute right-0 top-1/2 -translate-y-1/2 p-2 text-[#D4AF37] disabled:opacity-30 transition-all hover:scale-110">
                                    <Plus size={20} />
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen font-sans overflow-hidden flex flex-col transition-colors duration-700 relative selection:bg-[#D4AF37] selection:text-white ${isDarkMode ? 'bg-[#0d1310] text-[#d1d7d3]' : 'bg-[#f0f2ef] text-[#2c352d]'}`}>
                    <ActionModal />
                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-40 pointer-events-none mix-blend-overlay"></div>
                    <div className={`absolute top-0 left-0 w-[40rem] h-[40rem] opacity-20 blur-[100px] rounded-full -translate-x-1/2 -translate-y-1/2 pointer-events-none transition-colors duration-1000 ${isDarkMode ? 'bg-[#183a29]' : 'bg-[#1b4332]'}`}></div>
                    <div className={`absolute bottom-0 right-0 w-[40rem] h-[40rem] opacity-[0.08] blur-[100px] rounded-full translate-x-1/3 translate-y-1/3 pointer-events-none transition-colors duration-1000 ${isDarkMode ? 'bg-[#D4AF37]' : 'bg-[#D4AF37]'}`}></div>
                    <Leaf className={`absolute top-12 -left-12 w-64 h-64 -rotate-45 pointer-events-none transition-colors duration-1000 ${isDarkMode ? 'text-[#183a29] opacity-30' : 'text-[#1b4332] opacity-10'}`} />
                    <Leaf className={`absolute bottom-12 -right-12 w-80 h-80 rotate-45 pointer-events-none transition-colors duration-1000 ${isDarkMode ? 'text-[#183a29] opacity-30' : 'text-[#1b4332] opacity-10'}`} />

                    <header className="px-8 md:px-16 pt-8 pb-4 flex justify-between items-center shrink-0 relative z-20">
                        <div className="flex items-center gap-5">
                            <div className={`w-14 h-14 rounded-full border flex items-center justify-center backdrop-blur-md shadow-lg transition-colors duration-500 ${isDarkMode ? 'bg-[#121a15]/80 border-[#D4AF37]/50 shadow-[#0d1310]' : 'bg-[#183a29] border-[#D4AF37]'}`}>
                                <Crown size={26} className="text-[#D4AF37]" />
                            </div>
                            <div>
                                <h1 className={`text-3xl font-serif tracking-widest uppercase transition-colors duration-500 ${isDarkMode ? 'text-[#D4AF37]' : 'text-[#183a29]'}`}>Olimpo</h1>
                                <p className={`font-light text-sm mt-1 tracking-wider transition-colors duration-500 ${isDarkMode ? 'text-[#84948a]' : 'text-[#52665a]'}`}>A sua harmonia diária</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-3 rounded-full border transition-all duration-300 focus:outline-none flex items-center justify-center ${isDarkMode ? 'bg-[#17201a] border-[#3a4d41] text-[#D4AF37]' : 'bg-white border-[#e2e8e4] text-[#183a29]'}`} title={isDarkMode ? "Modo Diurno" : "Modo Noturno"}>
                                {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                            </button>
                            <button onClick={() => setShowAddList(true)} className={`px-6 py-3 rounded-full border font-medium tracking-wide text-sm transition-all duration-300 focus:outline-none flex items-center gap-2 shadow-lg ${isDarkMode ? 'bg-[#D4AF37] border-[#D4AF37] text-[#0d1310]' : 'bg-[#183a29] border-[#183a29] text-[#D4AF37]'}`}>
                                <Plus size={18} /> <span className="hidden sm:inline uppercase tracking-widest text-xs font-bold">Nova Categoria</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 relative flex flex-col justify-start z-10">
                        {lists.length === 0 && !showAddList ? (
                            <div className="absolute inset-0 flex flex-col items-center justify-center px-6 text-center">
                                <div className={`w-24 h-24 mb-6 rounded-full border flex items-center justify-center shadow-lg transition-colors duration-500 ${isDarkMode ? 'bg-[#121a15] border-[#243329]' : 'bg-white border-[#e2e8e4]'}`}>
                                    <Palmtree size={40} className="text-[#D4AF37] opacity-90" />
                                </div>
                                <h3 className={`text-2xl font-serif mb-3 tracking-wide transition-colors duration-500 ${isDarkMode ? 'text-[#D4AF37]' : 'text-[#183a29]'}`}>Jardim Intocado</h3>
                                <p className={`max-w-md font-light leading-relaxed transition-colors duration-500 ${isDarkMode ? 'text-[#84948a]' : 'text-[#52665a]'}`}>Não existem compromissos registados.</p>
                            </div>
                        ) : (
                            <div ref={carouselRef} className="flex gap-10 overflow-x-auto snap-x snap-mandatory px-8 md:px-16 hide-scrollbar pt-6 pb-12 items-start h-full">
                                {lists.map(list => <ListCard key={list.id} list={list} />)}

                                {showAddList && (
                                    <div className={`snap-center shrink-0 w-[85vw] sm:w-[380px] h-[75vh] max-h-[750px] flex flex-col justify-center rounded-t-[3.5rem] rounded-b-3xl p-10 transition-all duration-500 relative border shadow-2xl ${isDarkMode ? 'bg-[#121a15]/80 backdrop-blur-md border-[#D4AF37]/30' : 'bg-white/80 backdrop-blur-md border-[#183a29]/20'}`}>
                                        <button onClick={() => setShowAddList(false)} className={`absolute top-10 right-10 transition-colors ${isDarkMode ? 'text-[#84948a]' : 'text-[#a4b3a9]'}`}><X size={24} /></button>
                                        <div className="text-center mb-10 mt-8">
                                            <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner border transition-colors duration-500 ${isDarkMode ? 'bg-[#17201a] border-[#D4AF37]/40 text-[#D4AF37]' : 'bg-[#f4f7f5] border-[#183a29]/20 text-[#183a29]'}`}><Plus size={32} /></div>
                                            <h3 className={`text-2xl font-serif tracking-wider uppercase transition-colors duration-500 ${isDarkMode ? 'text-[#D4AF37]' : 'text-[#183a29]'}`}>Nova Categoria</h3>
                                        </div>
                                        <form onSubmit={addList} className="space-y-10 w-full">
                                            <input type="text" autoFocus value={newListTitle} onChange={(e) => setNewListTitle(e.target.value)} placeholder="Ex: Finanças, Viagens..." className={`w-full bg-transparent border-b-2 text-center text-lg px-4 py-3 focus:outline-none shadow-none font-light transition-colors duration-300 ${isDarkMode ? 'border-[#3a4d41] text-[#D4AF37] focus:border-[#D4AF37]' : 'border-[#d8e0db] text-[#183a29] focus:border-[#183a29]'}`} />
                                            <div className="pt-4 flex justify-center">
                                                <button type="submit" disabled={!newListTitle.trim()} className={`px-12 py-3.5 rounded-full font-bold uppercase tracking-widest text-xs transition-all duration-300 shadow-xl ${isDarkMode ? 'bg-[#D4AF37] text-[#0d1310] disabled:opacity-40' : 'bg-[#183a29] text-[#D4AF37] disabled:opacity-40'}`}>Criar Pilar</button>
                                            </div>
                                        </form>
                                    </div>
                                )}
                                {lists.length > 0 && <div className="shrink-0 w-[5vw] sm:w-[10vw]"></div>}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
